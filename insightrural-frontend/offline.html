<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - InsightRural</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --accent: #10a37f;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .offline-container {
            max-width: 400px;
        }

        .offline-icon {
            width: 120px;
            height: 120px;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #10a37f 0%, #1e90ff 100%);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.05);
                opacity: 0.8;
            }
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #10a37f 0%, #1e90ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .retry-btn {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #10a37f 0%, #1e90ff 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 163, 127, 0.3);
        }

        .tips {
            margin-top: 3rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            text-align: left;
        }

        .tips h3 {
            font-size: 0.9rem;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .tips ul {
            list-style: none;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .tips li {
            padding: 0.5rem 0;
            padding-left: 1.5rem;
            position: relative;
        }

        .tips li::before {
            content: "📍";
            position: absolute;
            left: 0;
        }
    </style>
</head>

<body>
    <div class="offline-container">
        <div class="offline-icon">📶</div>
        <h1>You're Offline</h1>
        <p>Don't worry! InsightRural works offline. Some features may be limited until you're back online.</p>

        <button class="retry-btn" onclick="window.location.reload()">
            Try Again
        </button>

        <div class="tips">
            <h3>💡 Available Offline:</h3>
            <ul>
                <li>View previously loaded colleges</li>
                <li>Check saved predictions</li>
                <li>Review scholarship information</li>
                <li>Access document checklist</li>
            </ul>
        </div>
    </div>

    <script>
        // Check for connection restoration
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</body>

</html>
